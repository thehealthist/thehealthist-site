<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | The Healthist</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#faf9f6] text-[#2c3e35]">

    <!-- Navigation -->
    <nav class="border-b border-[#e5e3dc] bg-white/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tight text-[#1e3a2f]">the<span class="text-[#4a7c59]">healthist</span>.org</a>
            <div class="flex space-x-8 font-medium">
                <a href="index.html" class="hover:text-[#4a7c59] transition">Home</a>
                <a href="blog.html" class="hover:text-[#4a7c59] transition">Blog</a>
                <a href="resources.html" class="hover:text-[#4a7c59] transition">Resources</a>
                <a href="contact.html" class="text-[#4a7c59]">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Contact Form Container -->
    <main class="max-w-xl mx-auto px-6 py-16">
        <h1 class="text-4xl font-serif font-bold text-[#1e3a2f] mb-3 text-center">Initiate Connection</h1>
        <p class="text-slate-600 text-center mb-10">Want to collaborate, submit a clinical study, or ask a question? Drop a message below.</p>

        <!-- Using a free handling service like Formspree makes static sites collect forms flawlessly -->
        <form action="#" method="POST" class="bg-white p-8 rounded-2xl border border-[#e5e3dc] shadow-sm space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Your Name</label>
                <input type="text" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#4a7c59] bg-slate-50/50">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Email Address</label>
                <input type="email" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#4a7c59] bg-slate-50/50">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Message</label>
                <textarea rows="5" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#4a7c59] bg-slate-50/50"></textarea>
            </div>
            <button type="submit" class="w-full bg-[#4a7c59] text-white py-3 rounded-lg font-medium hover:bg-[#3b6347] transition">Send Message</button>
        </form>
    </main>

</body>
</html>
